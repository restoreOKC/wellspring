  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"0eb817a5-573e-4c0b-9ff1-7a30cbb838e9\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<style>\n  body{margin:0}\n  ::selection{background:rgba(47,111,79,.25)}\n  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#e7e4dd;padding:36px;font-family:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;box-sizing:border-box\">\n  <div style=\"width:1180px;max-width:100%;padding:14px;background:#17181a;border-radius:34px;box-shadow:0 30px 70px rgba(0,0,0,.25)\">\n    <div style=\"background:#f6f5f1;border-radius:22px;overflow:hidden;height:800px;display:flex;flex-direction:column\">\n\n      <!-- Top bar -->\n      <div style=\"flex:none;display:flex;align-items:center;gap:14px;padding:18px 28px;background:#ffffff;border-bottom:1px solid rgba(28,33,29,.08)\">\n        <sc-if value=\"{{ vm.isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ vm.goBack }}\" style=\"border:none;background:rgba(28,33,29,.06);color:#1c211d;width:38px;height:38px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center\">←<\u002Fbutton>\n        <\u002Fsc-if>\n        <img src=\"badd4f85-d5c7-4664-bed1-ce54280058d8\" style=\"width:38px;height:38px;border-radius:9px;object-fit:contain;flex:none\">\n        <div style=\"flex:1\">\n          <div style=\"font-size:15px;font-weight:700;letter-spacing:.1px\">Wellspring Cleaning Company<\u002Fdiv>\n          <sc-if value=\"{{ vm.isList }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:12px;color:rgba(28,33,29,.5)\">Today's Jobs — Tue, Jul 12<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ vm.isSchedule }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:rgba(28,33,29,.5)\">Week of Jul 11 – Jul 16<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ vm.isTeams }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:rgba(28,33,29,.5)\">Today's Teams<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ vm.isClients }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:rgba(28,33,29,.5)\">Client Directory<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ vm.isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:rgba(28,33,29,.5)\">{{ vm.job.address }} · {{ vm.job.client }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ vm.isTopLevel }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;gap:4px;background:rgba(28,33,29,.06);padding:4px;border-radius:11px\">\n            <button sc-camel-on-click=\"{{ vm.onNavList }}\" style=\"border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:{{ vm.navListBg }};color:{{ vm.navListColor }}\">Today's Jobs<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ vm.onNavSchedule }}\" style=\"border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:{{ vm.navScheduleBg }};color:{{ vm.navScheduleColor }}\">Schedule<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ vm.onNavTeams }}\" style=\"border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:{{ vm.navTeamsBg }};color:{{ vm.navTeamsColor }}\">Teams<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ vm.onNavClients }}\" style=\"border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:{{ vm.navClientsBg }};color:{{ vm.navClientsColor }}\">Clients<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ vm.isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:{{ vm.job.statusBg }};color:{{ vm.job.statusColor }}\">{{ vm.job.statusLabel }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Scrollable content -->\n      <div style=\"flex:1;overflow-y:auto;padding:28px;box-sizing:border-box\">\n\n        <!-- ============ JOB LIST SCREEN ============ -->\n        <sc-if value=\"{{ vm.isList }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ vm.jobsList }}\" as=\"j\" hint-placeholder-count=\"3\">\n              <div sc-camel-on-click=\"{{ j.onSelect }}\" style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid rgba(28,33,29,.08);border-radius:16px;padding:18px 20px;cursor:pointer;animation:fadeSlide .25s ease\">\n                <div style=\"width:6px;align-self:stretch;border-radius:4px;background:{{ j.statusColor }}\"><\u002Fdiv>\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"font-size:16px;font-weight:700\">{{ j.address }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:rgba(28,33,29,.55);margin-top:2px\">{{ j.client }} · {{ j.time }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:-6px\">\n                  <sc-for list=\"{{ j.crewAvatars }}\" as=\"cav\" hint-placeholder-count=\"2\">\n                    <div style=\"width:32px;height:32px;margin-left:-8px;border-radius:50%;background:{{ cav.color }};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff\">{{ cav.initials }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"width:130px;flex:none\">\n                  <div style=\"font-size:11px;color:rgba(28,33,29,.5);margin-bottom:4px;text-align:right\">{{ j.pctLabel }} checklist<\u002Fdiv>\n                  <div style=\"height:6px;border-radius:4px;background:rgba(28,33,29,.08);overflow:hidden\">\n                    <div style=\"height:100%;width:{{ j.pctWidth }};background:{{ vm.accent }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:{{ j.statusBg }};color:{{ j.statusColor }};flex:none\">{{ j.statusLabel }}<\u002Fdiv>\n                <div style=\"font-size:18px;color:rgba(28,33,29,.3)\">›<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n<!-- ============ CLIENTS SCREEN ============ -->\n        <sc-if value=\"{{ vm.isClients }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"background:#fff;border:1px solid rgba(28,33,29,.08);border-radius:16px;padding:18px;margin-bottom:20px\">\n              <div style=\"font-size:14px;font-weight:700;margin-bottom:12px\">Add Client<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px\">\n                <input value=\"{{ vm.clientsVm.newClient.name }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.name }}\" placeholder=\"Full name\" style=\"font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15);box-sizing:border-box\">\n                <input value=\"{{ vm.clientsVm.newClient.address }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.address }}\" placeholder=\"Service address\" style=\"font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15);box-sizing:border-box\">\n                <input value=\"{{ vm.clientsVm.newClient.phone }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.phone }}\" placeholder=\"Cell phone\" style=\"font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15);box-sizing:border-box\">\n                <input value=\"{{ vm.clientsVm.newClient.email }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.email }}\" placeholder=\"Email\" style=\"font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15);box-sizing:border-box\">\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px\">\n                <label style=\"font-size:11.5px;color:rgba(28,33,29,.55)\">Bedrooms\n                  <input type=\"number\" min=\"0\" value=\"{{ vm.clientsVm.newClient.beds }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.beds }}\" style=\"width:100%;box-sizing:border-box;margin-top:4px;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15)\">\n                <\u002Flabel>\n                <label style=\"font-size:11.5px;color:rgba(28,33,29,.55)\">Bathrooms\n                  <input type=\"number\" min=\"0\" value=\"{{ vm.clientsVm.newClient.baths }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.baths }}\" style=\"width:100%;box-sizing:border-box;margin-top:4px;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15)\">\n                <\u002Flabel>\n                <label style=\"font-size:11.5px;color:rgba(28,33,29,.55)\">Square Feet\n                  <input value=\"{{ vm.clientsVm.newClient.sqft }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.sqft }}\" placeholder=\"1,800\" style=\"width:100%;box-sizing:border-box;margin-top:4px;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid rgba(28,33,29,.15)\">\n                <\u002Flabel>\n              <\u002Fdiv>\n              <textarea value=\"{{ vm.clientsVm.newClient.notes }}\" sc-camel-on-change=\"{{ vm.clientsVm.onField.notes }}\" placeholder=\"Special instructions (e "{{ item.onToggle }}\" style=\"display:flex;align-items:center;gap:11px;padding:7px 0;cursor:pointer\">\n                          <div style=\"width:21px;height:21px;border-radius:6px;flex:none;border:2px solid {{ item.circleBorder }};background:{{ item.circleBg }};color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center\">{{ item.checkGlyph }}<\u002Fdiv>\n                          <div style=\"font-size:13.5px;text-decoration:{{ item.deco }};color:{{ item.textColor }}\">{{ item.text }}<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                      <div style=\"width:100%;height:140px\">\n                        <x-import component-from-global-scope=\"image-slot\" from=\"1c371104-1625-4ac6-9df1-4e375fa64a0f#/image-slot.js\" id=\"photo-{{ vm.job.id }}-{{ room.id }}-before\" shape=\"rounded\" radius=\"12\" placeholder=\"Before photo\" hint-size=\"100%,140px\"><\u002Fx-import>\n                      <\u002Fdiv>\n                      <div style=\"width:100%;height:140px\">\n                        <x-import component-from-global-scope=\"image-slot\" from=\"1c371104-1625-4ac6-9df1-4e375fa64a0f#/image-slot.js\" id=\"photo-{{ vm.job.id }}-{{ room.id }}-after\" shape=\"rounded\" radius=\"12\" placeholder=\"After photo\" hint-size=\"100%,140px\"><\u002Fx-import>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:10.5px;font-weight:700;color:rgba(28,33,29,.4);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px\">Other (optional — damage, breaks, anything major)<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                      <sc-for list=\"{{ room.otherPhotoSlots }}\" as=\"ph\" hint-placeholder-count=\"2\">\n                        <div style=\"width:100%;height:110px\">\n                          <x-import component-from-global-scope=\"image-slot\" from=\"1c371104-1625-4ac6-9df1-4e375fa64a0f#/image-slot.js\" id=\"{{ ph.id }}\" shape=\"rounded\" radius=\"12\" placeholder=\"Other photo (optional)\" hint-size=\"100%,110px\"><\u002Fx-import>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <dc-import name=\"SummaryPanel\" s=\"{{ vm.job.summary }}\" accent=\"{{ vm.accent }}\" hint-size=\"100%,400px\"><\u002Fdc-import>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1250,&quot;height&quot;:870},&quot;jobDetailLayout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;tabbed&quot;,&quot;options&quot;:[&quot;tabbed&quot;,&quot;masterDetail&quot;,&quot;timeline&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;showCrewBadges&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Accountability&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f6f4f&quot;,&quot;options&quot;:[&quot;#2f6f4f&quot;,&quot;#2a5fb8&quot;,&quot;#3a6ea5&quot;,&quot;#4a7c59&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;calendarColorBy&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;status&quot;,&quot;options&quot;:[&quot;status&quot;,&quot;crew&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Schedule&quot;}}\">\nclass Component extends DCLogic {\n  crewDirectorySeed = {\n    1: { name: 'Maria Gutierrez', initials: 'MG', color: '#2f6f4f' },\n    2: { name: 'Jordan Tate', initials: 'JT', color: '#3a6ea5' },\n    3: { name: 'Alex Pham', initials: 'AP', color: '#b5762c' },\n    4: { name: 'Sam Rivera', initials: 'SR', color: '#7a5aa8' }\n  };\n  get crewDirectory() { return this.state.crewDirectory; }\n  avatarColors = ['#2f6f4f', '#3a6ea5', '#b5762c', '#7a5aa8', '#b04f6a', '#4d8a8a', '#8a7a2f'];\n\n  checklistTemplates = {\n    kitchen: [\n      'Move, wipe & shine small appliances (coffee pot, toaster, microwave, counter items)',\n      'Counter tops — free of debris, wiped & shined',\n      'Fronts of cabinets, drawer pulls & knobs, all cabinet door edges',\n      'Large appliances — clean cracks & crevices (stove door lip, drawers, dishwasher, inner fridge door, range hood)',\n      'Sink — shine faucet, clean disposal rubber & drain, dish soap holder/dispenser',\n      'Backsplash',\n      'Sweep under cabinets, vacuum & mop',\n      'Wipe washer & dryer, clean inside lip and glass (if present)'\n    ],\n    bath: [\n      'Remove all hair before getting things wet',\n      'Clean tile walls',\n      'Clean shower walls, floor, drain, knobs & sliding door tracks',\n      'Clean glass shower doors',\n      'Wipe clean shampoo & soap bottles',\n      'Clean & shine fixtures, toilet paper holders, towel racks',\n      'Toilet — inside, outside, front, back, lid, base, hinges, behind & water hose',\n      'Clean & shine mirrors',\n      'Clean sinks & drain holes',\n      'Faucets — remove grime build-up',\n      'Baseboards'\n    ],\n    living: [\n      'Ceiling fans & light fixtures',\n      'Dust picture frames (tops, edges & glass)',\n      'Blinds & window frames — dust, remove insects & cobwebs',\n      'Woodwork & trim — clean handprints & dirt marks (incl. doors & frames)',\n      'Light switch & plug covers',\n      'Baseboards — sweep & hand wipe when needed',\n      'Clean all glass decor with shiny towel',\n      'Dust all decor, move to dust underneath & behind',\n      'Dust furniture — edges, front, sides, bottom, feet',\n      'Dust lamps & bulbs',\n      'Wood floors — sweep, vacuum, mop',\n      'Remove dust & pet hair from cords & furniture bottoms',\n      'Sweep & vacuum under edges of large area rugs',\n      'Remove/shake small rugs, mop floor, replace rug',\n      'Clean inside & outside glass on front/back doors',\n      'Remove pet hair from furniture, fluff pillows & cushions',\n      'Vacuum carpets & large rugs'\n    ],\n    bedroom: [\n      'Beds — all cracks & crevices (headboards, crib frames wiped)',\n      'Dressers & side tables — straightened, dusted (incl. lamps & bulbs)',\n      'Blinds, window sills, fans',\n      'Straighten up toys and put away',\n      'Wipe and empty diaper pails'\n    ],\n    utility: [\n      'Wipe washer & dryer exteriors and lids',\n      'Clean inside lip of washer & dryer glass (if present)',\n      'Wipe down shelving & counters, clear of debris',\n      'Empty & reline trash cans',\n      'Sweep & mop floor',\n      'Dust light fixtures & vents',\n      'Straighten supplies/utility items'\n    ]\n  };\n\n  makeChecklist(type, doneCount = 0) {\n    return this.checklistTemplates[type].map((text, i) => ({ id: i + 1, text, done: i < doneCount }));\n  }\n\n  supplyNames = ['Mrs. Clean', 'Pine-Souls', \"Bar Keeper's Friends\", 'Suds Life', 'Scrub Daddies', 'The Windex Wizards', 'Bleach Please', 'Squeegee Squad', 'Mop Tops', 'The Lysol Legends', 'Comet Crew', 'Sparkle Motion'];\n\n  genTeamName(excluding = []) {\n    const pool = this.supplyNames.filter(n => !excluding.includes(n));\n    const pick = pool[Math.floor(Math.random() * pool.length)] || this.supplyNames[0];\n    return 'Team ' + pick;\n  }\n\n  state = {\n    screen: 'list',\n    selectedJobId: 1,\n    expandedScheduleJobId: null,\n    draggingJobId: null,\n    teamsUnlocked: false,\n    teamsPasswordInput: '',\n    teamsPasswordError: false,\n    newStaffName: '',\n    newClient: { name: '', address: '', phone: '', email: '', beds: 3, baths: 2, sqft: '', notes: '' },\n    clients: [\n      { id: 1, name: 'Denise Carlson', address: '482 Maple Ridge Dr', phone: '(405) 555-0148', email: 'denise.carlson@email.com', beds: 2, baths: 1, sqft: '1,450', notes: '' },\n      { id: 2, name: 'Marcus Nguyen', address: '110 Birchwood Ln', phone: '(405) 555-0172', email: 'marcus.nguyen@email.com', beds: 1, baths: 1, sqft: '900', notes: 'Skip the office — it is being renovated.' },\n      { id: 3, name: 'Priya Anand', address: '790 Sycamore Ct', phone: '(405) 555-0199', email: 'priya.anand@email.com', beds: 2, baths: 2, sqft: '1,800', notes: '' }\n    ],\n    crewDirectory: {\n      1: { name: 'Maria Gutierrez', initials: 'MG', color: '#2f6f4f' },\n      2: { name: 'Jordan Tate', initials: 'JT', color: '#3a6ea5' },\n      3: { name: 'Alex Pham', initials: 'AP', color: '#b5762c' },\n      4: { name: 'Sam Rivera', initials: 'SR', color: '#7a5aa8' }\n    },\n    teams: [\n      { id: 1, name: 'Team Suds Life', leadId: 1, memberIds: [1, 2] },\n      { id: 2, name: \"Team Bar Keeper's Friends\", leadId: 3, memberIds: [3] }\n    ],\n    jobs: [\n      {\n        id: 1, address: '482 Maple Ridge Dr', client: 'Denise Carlson', time: '9:00 AM', status: 'in-progress', day: 'tue',\n        customerPhone: '(405) 555-0148', customerEmail: 'denise.carlson@email.com', reviewSent: false, reviewSentAt: null,\n        crewIds: [1, 2], leadId: 1,\n        crewTimes: {\n          1: { clockedIn: true, inTime: new Date(2026, 6, 12, 8, 52), outTime: null },\n          2: { clockedIn: true, inTime: new Date(2026, 6, 12, 8, 55), outTime: null }\n        },\n        activeTab: 'checklist', activeRoomId: 'kitchen',\n        signOffName: '', signed: false,\n        rooms: [\n          { id: 'kitchen', name: 'Kitchen', assignedCrewId: 1, before: true, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('kitchen', 4) },\n          { id: 'living', name: 'Living Room', assignedCrewId: 2, before: true, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('living', 6) },\n          { id: 'bedroom1', name: 'Primary Bedroom', assignedCrewId: 2, before: false, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('bedroom', 2) },\n          { id: 'bath1', name: 'Bathroom 1', assignedCrewId: 1, before: false, after: false, flagged: true, note: \"Grout stain won't lift with standard supplies — may need a deep-clean revisit.\",\n            checklist: this.makeChecklist('bath', 0) },\n          { id: 'bath2', name: 'Bathroom 2', assignedCrewId: 2, before: false, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('bath', 3) },\n          { id: 'utility', name: 'Utility Room', assignedCrewId: 1, before: false, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('utility', 1) }\n        ]\n      },\n      {\n        id: 2, address: '110 Birchwood Ln', client: 'Marcus Nguyen', time: '11:30 AM', status: 'not-started', day: 'tue',\n        customerPhone: '(405) 555-0172', customerEmail: 'marcus.nguyen@email.com', reviewSent: false, reviewSentAt: null,\n        crewIds: [3], leadId: 3,\n        crewTimes: { 3: { clockedIn: false, inTime: null, outTime: null } },\n        activeTab: 'checklist', activeRoomId: 'bed',\n        signOffName: '', signed: false,\n        rooms: [\n          { id: 'bed', name: 'Bedroom', assignedCrewId: 3, before: false, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('bedroom', 0) },\n          { id: 'kitchen', name: 'Kitchen', assignedCrewId: 3, before: false, after: false, flagged: false, note: '',\n            checklist: this.makeChecklist('kitchen', 0) }\n        ]\n      },\n      {\n        id: 3, address: '790 Sycamore Ct', client: 'Priya Anand', time: '1:00 PM', status: 'completed', day: 'tue',\n        customerPhone: '(405) 555-0199', customerEmail: 'priya.anand@email.com', reviewSent: true, reviewSentAt: new Date(2026, 6, 12, 14, 24),\n        crewIds: [2, 4], leadId: 2,\n        crewTimes: {\n          2: { clockedIn: false, inTime: new Date(2026, 6, 12, 12, 58), outTime: new Date(2026, 6, 12, 14, 20) },\n          4: { clockedIn: false, inTime: new Date(2026, 6, 12, 13, 2), outTime: new Date(2026, 6, 12, 14, 20) }\n        },\n        activeTab: 'summary', activeRoomId: 'summary',\n        signOffName: 'Priya Anand', signed: true,\n        rooms: [\n          { id: 'kitchen', name: 'Kitchen', assignedCrewId: 2, before: true, after: true, flagged: false, note: '',\n            checklist: this.makeChecklist('kitchen', 8) },\n          { id: 'living', name: 'Living Room', assignedCrewId: 4, before: true, after: true, flagged: false, note: '',\n            checklist: this.makeChecklist('living', 17) },\n          { id: 'bath', name: 'Bathroom', assignedCrewId: 2, before: true, after: true, flagged: false, note: '',\n            checklist: this.makeChecklist('bath', 11) }\n        ]\n      },\n      this.seedJob(4, '214 Windmere Ave', 'Tom Reilly', '8:00 AM', 'mon', [3]),\n      this.seedJob(5, '55 Falcon Crest Way', 'Grace Kim', '10:00 AM', 'wed', [1, 4]),\n      this.seedJob(6, '32 Aspen Grove Ct', 'Diego Alvarez', '9:30 AM', 'thu', [2]),\n      this.seedJob(7, '908 Wrenfield Pl', 'Olivia Brooks', '1:30 PM', null, []),\n      this.seedJob(8, '61 Cobalt Harbor Rd', 'Renee Wu', '3:00 PM', null, [])\n    ]\n  };\n\n  setNewClientField(key, val) { this.setState(s => ({ newClient: { ...s.newClient, [key]: val } })); }\n\n  addClient() {\n    const c = this.state.newClient;\n    if (!c.name.trim() || !c.address.trim()) return;\n    this.setState(s => {\n      const nextId = Math.max(0, ...s.clients.map(cl => cl.id)) + 1;\n      return {\n        clients: [...s.clients, { id: nextId, name: c.name.trim(), address: c.address.trim(), phone: c.phone.trim(), email: c.email.trim(), beds: Number(c.beds) || 0, baths: Number(c.baths) || 0, sqft: c.sqft      beds: e => this.setNewClientField('beds', e.target.value),\n          baths: e => this.setNewClientField('baths', e.target.value),\n          sqft: e => this.setNewClientField('sqft', e.target.value),\n          notes: e => this.setNewClientField('notes', e.target.value)\n        },\n        onAdd: () => this.addClient(),\n        list: this.state.clients.map(c => ({\n          id: c.id, name: c.name, address: c.address, phone: c.phone, email: c.email,\n          houseLabel: `${c.beds} Bed${c.beds === 1 ? '' : 's'} · ${c.baths} Bath${c.baths === 1 ? '' : 's'}${c.sqft ? ' · ' + c.sqft + ' sqft' : ''}`,\n          notes: c.notes, hasNotes: !!c.notes,\n          onCreateJob: () => this.createJobFromClient(c.id)\n        }))\n      };\n    }\n\n    const isTeams = this.state.screen === 'teams';\n    const teamsLocked = isTeams && !this.state.teamsUnlocked;\n    let teamsVm = null;\n    if (isTeams) {\n      teamsVm = {\n        locked: teamsLocked,\n        unlocked: !teamsLocked,\n        passwordInput: this.state.teamsPasswordInput,\n        passwordError: this.state.teamsPasswordError,\n        onPasswordChange: e => this.setTeamsPasswordInput(e.target.value),\n        onUnlock: () => this.tryUnlockTeams(),\n        newStaffName: this.state.newStaffName,\n        onNewStaffNameChange: e => this.setNewStaffName(e.target.value),\n        onAddStaff: () => this.addStaffMember()\n      };\n    }\n    if (isTeams && !teamsLocked) {\n      const allCrew = Object.keys(this.crewDirectory).map(Number).map(cid => ({ id: cid, ...this.crewDirectory[cid] }));\n      const jobOptions = this.state.jobs.map(j => ({ id: j.id, label: `${j.address} · ${j.time}` }));\n      Object.assign(teamsVm, {\n        onAddTeam: () => this.addTeam(),\n        list: this.state.teams.map(t => {\n          const lead = this.crewDirectory[t.leadId];\n          return {\n            id: t.id, name: t.name,\n            onRegenName: () => this.regenTeamName(t.id),\n            onRemove: () => this.removeTeam(t.id),\n            leadId: t.leadId,\n            leadOptions: t.memberIds.map(cid => ({ id: cid, name: this.crewDirectory[cid].name })),\n            onSetLead: e => this.setTeamLead(t.id, Number(e.target.value)),\n            members: allCrew.map(c => ({\n              id: c.id, name: c.name, color: c.color, initials: c.initials,\n              checked: t.memberIds.includes(c.id), isLead: t.leadId === c.id,\n              onToggle: () => this.toggleTeamMember(t.id, c.id)\n            })),\n            jobOptions: [{ id: '', label: 'Assign to a job…' }, ...jobOptions],\n            onAssignJob: e => { const v = e.target.value; if (v) this.assignTeamToJob(t.id, Number(v)); }\n          };\n        }),\n        staffList: allCrew\n      });\n    }\n\n    let schedule = null;\n    if (isSchedule) {\n      const dayDefs = [\n        { key: 'mon', label: 'Mon', date: 'Jul 11' },\n        { key: 'tue', label: 'Tue', date: 'Jul 12' },\n        { key: 'wed', label: 'Wed', date: 'Jul 13' },\n        { key: 'thu', label: 'Thu', date: 'Jul 14' },\n        { key: 'fri', label: 'Fri', date: 'Jul 15' },\n        { key: 'sat', label: 'Sat', date: 'Jul 16' }\n      ];\n      const buildCard = raw => {\n        const meta = this.statusMeta(raw.status, accent);\n        const primaryCrew = raw.crewIds.length ? this.crewDirectory[raw.crewIds[0]] : null;\n        const barColor = colorBy === 'crew' ? (primaryCrew ? primaryCrew.color : 'rgba(28,33,29,.2)') : meta.color === '#ffffff' ? accent : meta.color;\n        return {\n          id: raw.id, address: raw.address, client: raw.client, time: raw.time,\n          statusLabel: meta.label, barColor,\n          crewChips: raw.crewIds.map(cid => this.crewDirectory[cid]),\n          isExpanded: this.state.expandedScheduleJobId === raw.id,\n          onToggleExpand: () => this.toggleExpandSchedule(raw.id),\n          onDragStart: () => this.setDragging(raw.id),\n          onOpenDetail: () => this.selectJob(raw.id),\n          leadId: raw.leadId,\n          hasLead: raw.crewIds.length > 0,\n          onSetLead: e => this.setLead(raw.id, Number(e.target.value)),\n          leadOptions: raw.crewIds.map(cid => ({ id: cid, name: this.crewDirectory[cid].name })),\n          crewCheckboxes: Object.values(this.crewDirectory).map((dir, idx) => {\n            const cid = Number(Object.keys(this.crewDirectory)[idx]);\n            return { id: cid, name: dir.name, color: dir.color, initials: dir.initials, checked: raw.crewIds.includes(cid), isLead: raw.leadId === cid, onToggle: () => this.toggleJobCrew(raw.id, cid) };\n          })\n        };\n      };\n      const columns = dayDefs.map(d => ({\n        ...d, isToday: d.key === 'tue',\n        jobs: this.state.jobs.filter(j => j.day === d.key).map(buildCard),\n        onDrop: () => this.moveJobToDay(this.state.draggingJobId, d.key)\n      }));\n      const unassigned = this.state.jobs.filter(j => j.day == null).map(buildCard);\n      schedule = { columns, unassigned, allowDrop: e => this.allowDrop(e), onDropUnassigned: () => this.moveJobToDay(this.state.draggingJobId, null) };\n    }\n\n    return {\n      vm: {\n        isList, isDetail, isSchedule, isTeams, isClients, isTopLevel: isList || isSchedule || isTeams || isClients, accent, showCrewBadges,\n        isTabbed: layout === 'tabbed', isMasterDetail: layout === 'masterDetail', isTimeline: layout === 'timeline',\n        jobsList, job, schedule, teamsVm, clientsVm,\n        navListBg: isList ? accent : 'transparent', navListColor: isList ? '#fff' : 'rgba(28,33,29,.6)',\n        navScheduleBg: isSchedule ? accent : 'transparent', navScheduleColor: isSchedule ? '#fff' : 'rgba(28,33,29,.6)',\n        navTeamsBg: isTeams ? accent : 'transparent', navTeamsColor: isTeams ? '#fff' : 'rgba(28,33,29,.6)',\n        navClientsBg: isClients ? accent : 'transparent', navClientsColor: isClients ? '#fff' : 'rgba(28,33,29,.6)',\n        onNavList: () => this.setScreen('list'),\n        onNavSchedule: () => this.setScreen('schedule'),\n        onNavTeams: () => this.setScreen('teams'),\n        onNavClients: () => this.setScreen('clients'),\n        goBack: () => this.goBack()\n      }\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
